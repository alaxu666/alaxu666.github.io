        }

            margin: 0;
            padding: 5mm;
            background: #f5f5f5;
        }
        .container {
            width: 1200px;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 8px;
        }
        canvas {
            width: 1200px !important;
            height: auto !important;
            display: block;
            max-width: 1200px;
        }
        @media print {
            .container {
                width: 100%;
                max-width: none;
                margin: 0;
            }
            canvas {
                width: 100% !important;
                max-width: none;
            }
        }
        h1 {
            text-align: center;
            font-size: 24px;
            margin: 10px 0;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;

            align-items: center;
        }

            height: 20px;
            margin-right: 8px;

        .color-ly { background: #20678A; }
        .color-gl { background: #F26E29; }
        .color-fy { background: #0F9ED5; }
        .chart-container {
            width: 1200px;
            height: 560px;
            margin: 20px auto;
        }
        .horizontal-chart-container {
            width: 1200px;
            height: 600px;
            margin: 30px auto;

        h2 {

            color: #156082;
            border-left: 5px solid #156082;

            font-size: 20px;

        .data-info {

</head>
