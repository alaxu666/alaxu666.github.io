            margin: 0;
            padding: 5mm;
            background: #f5f5f5;
        }
        .container {
            width: 1200px;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 8px;
        }
        canvas {
            width: 1200px !important;
            height: auto !important;
            display: block;
            max-width: 1200px;
        }
        @media print {
            .container {
                width: auto !important;
                max-width: none;
                margin: 0;
            }
            canvas {
                width: 1200px !important;
                height: auto !important;
                max-width: none;
            }

        h1 {
            text-align: center;
            font-size: 24px;
            margin: 10px 0;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            border-radius: 3px;
        }
        .color-2025 { background: #A6D396; }
        .color-ly { background: #20678A; }
        .color-gl { background: #F26E29; }
        .color-fy { background: #0F9ED5; }
        .chart-container {
            width: 1200px;
            height: 560px;
            margin: 20px auto;
        }
        .horizontal-chart-container {
            width: 1200px;
            height: 600px;
            margin: 30px auto;
            page-break-inside: avoid;
        }
        h2 {
            margin-top: 40px;
            color: #156082;
            border-left: 5px solid #156082;
            padding-left: 15px;
            font-size: 20px;
            page-break-after: avoid;
        }
        .chart-section {
            page-break-inside: avoid;
            break-inside: avoid;
        }
        .data-info {
            background: #f8f9fa;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
